<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GateApex – Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #08080c; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .container { text-align: center; padding: 2rem; max-width: 400px; }
    .logo { width: 64px; height: 64px; margin: 0 auto 1.5rem; border-radius: 18px; background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(99,102,241,0.15)); border: 1px solid rgba(139,92,246,0.25); display: flex; align-items: center; justify-content: center; }
    .logo svg { width: 36px; height: 36px; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 0.75rem; background: linear-gradient(135deg, #fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: rgba(255,255,255,0.45); font-size: 0.9rem; line-height: 1.6; }
    .pulse { width: 12px; height: 12px; border-radius: 50%; background: #7C3AED; margin: 1.5rem auto 0; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none"><path d="M10 22V10l6 6 6-6v12" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="g" x1="10" y1="10" x2="22" y2="22"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#818cf8"/></linearGradient></defs></svg>
    </div>
    <h1>You're offline</h1>
    <p>GateApex will automatically sync your progress when you're back online.</p>
    <div class="pulse"></div>
  </div>
</body>
</html>
