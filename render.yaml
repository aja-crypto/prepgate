services:
  - type: web
    name: gatenexa-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    healthCheckPath: /health
    healthCheckPolicy:
      responseTimeout: 30
      interval: 60
      threshold: 3
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 15m
      - key: JWT_REFRESH_EXPIRE
        value: 7d
      - key: CORS_ORIGIN
        value: https://gatenexa.in,https://www.gatenexa.in,https://gatenexa.vercel.app
      - key: FRONTEND_URL
        value: https://gatenexa.in
      - key: BACKEND_URL
        value: https://gatenexa-api.onrender.com
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.sendgrid.net
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        value: noreply@gatenexa.in
      - key: CRON_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: USE_MOCK_AUTH
        value: "false"
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
